services:
  db:
    image: mysql:latest
    container_name: PRODUCT_CONTAINER
    restart: always
    environment:
      MYSQL_DATABASE: 'PRODUCT_DATABASE'
      MYSQL_USER: 'user'
      MYSQL_PASSWORD: 'password'
      MYSQL_ROOT_PASSWORD: 'root'
    ports:
      - '3306:3306'
    expose:
      - '3306'
    volumes:
      - PRODUCT_CONTAINER_VOLUME:/var/lib/mysql
# Names our volume
volumes:
  PRODUCT_CONTAINER_VOLUME: